services:
  # ==================== Infrastructure ====================
  postgres:
    image: postgres:16-alpine
    container_name: vehicle-rental-postgres
    environment:
      POSTGRES_DB: vehicle_rental_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vehicle-rental-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Observability ====================
  loki:
    image: grafana/loki:latest
    container_name: vehicle-rental-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.7.2
    container_name: vehicle-rental-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    command: -config.file=/etc/tempo/tempo.yml

  prometheus:
    image: prom/prometheus:latest
    container_name: vehicle-rental-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  alloy:
    image: grafana/alloy:latest
    container_name: vehicle-rental-alloy
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - //var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:latest
    container_name: vehicle-rental-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  # ==================== Microservices ====================
  customer-service:
    image: vehicle-rental/customer-service:latest
    container_name: vehicle-rental-customer
    ports:
      - "8181:8181"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vehicle_rental_db
      DB_USERNAME: customer_user
      DB_PASSWORD: customer_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fleet-service:
    image: vehicle-rental/fleet-service:latest
    container_name: vehicle-rental-fleet
    ports:
      - "8182:8182"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vehicle_rental_db
      DB_USERNAME: fleet_user
      DB_PASSWORD: fleet_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reservation-service:
    image: vehicle-rental/reservation-service:latest
    container_name: vehicle-rental-reservation
    ports:
      - "8183:8183"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vehicle_rental_db
      DB_USERNAME: reservation_user
      DB_PASSWORD: reservation_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    image: vehicle-rental/payment-service:latest
    container_name: vehicle-rental-payment
    ports:
      - "8184:8184"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vehicle_rental_db
      DB_USERNAME: payment_user
      DB_PASSWORD: payment_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:
